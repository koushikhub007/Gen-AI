<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Gen AI</title>
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-card: #1a1a24;
      --border-color: #2a2a3a;
      --text-primary: #f0f0f5;
      --text-muted: #606070;
      --accent: #6366f1;
      --danger: #ef4444;
    }
    body { 
      font-family: 'Segoe UI', sans-serif; 
      background: var(--bg-primary); 
      color: var(--text-primary); 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      margin: 0; 
    }
    .auth-box { 
      background: var(--bg-card); 
      padding: 40px; 
      border-radius: 20px; 
      width: 100%; 
      max-width: 400px; 
      border: 1px solid var(--border-color);
      box-shadow: 0 0 30px rgba(99, 102, 241, 0.1); 
    }
    h2 { text-align: center; color: var(--accent); margin-bottom: 30px; font-size: 24px; }
    input { 
      width: 100%; 
      padding: 15px; 
      margin-bottom: 15px; 
      background: var(--bg-primary); 
      border: 1px solid var(--border-color); 
      border-radius: 10px; 
      color: var(--text-primary); 
      font-size: 16px; 
      outline: none; 
      transition: border-color 0.3s;
    }
    input:focus { border-color: var(--accent); }
    button { 
      width: 100%; 
      padding: 15px; 
      background: linear-gradient(135deg, #6366f1, #8b5cf6); 
      border: none; 
      border-radius: 10px; 
      color: white; 
      font-size: 16px; 
      font-weight: bold; 
      cursor: pointer; 
      transition: 0.3s; 
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(99, 102, 241, 0.4); }
    .switch { text-align: center; margin-top: 20px; color: #888; font-size: 14px; }
    .switch a { color: var(--accent); text-decoration: none; font-weight: bold; cursor: pointer; }
    .error { color: var(--danger); text-align: center; margin-bottom: 15px; font-size: 14px; display: none; background: rgba(239, 68, 68, 0.1); padding: 10px; border-radius: 8px;}
  </style>
</head>
<body>

<div class="auth-box">
  <h2 id="formTitle">Login</h2>
  <div id="errorBox" class="error"></div>
  
  <form id="authForm">
    <input type="text" id="username" placeholder="Username" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit" id="submitBtn">Login</button>
  </form>

  <div class="switch" id="switchText">
    Don't have an account? <a onclick="toggleForm()">Sign Up</a>
  </div>
</div>

<script>
  let isLogin = true;

  function toggleForm() {
    isLogin = !isLogin;
    const title = document.getElementById('formTitle');
    const btn = document.getElementById('submitBtn');
    const switchText = document.getElementById('switchText');
    
    title.innerText = isLogin ? "Login" : "Sign Up";
    btn.innerText = isLogin ? "Login" : "Sign Up";
    
    if (isLogin) {
        switchText.innerHTML = "Don't have an account? <a onclick='toggleForm()'>Sign Up</a>";
    } else {
        switchText.innerHTML = "Already have an account? <a onclick='toggleForm()'>Login</a>";
    }
    
    document.getElementById('errorBox').style.display = 'none';
  }

  document.getElementById('authForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const errorBox = document.getElementById('errorBox');
    
    const endpoint = isLogin ? '/api/login' : '/api/signup';

    try {
      const response = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      
      const data = await response.json();

      if (data.success) {
        window.location.href = "/";
      } else {
        errorBox.style.display = "block";
        errorBox.innerText = data.message || "Something went wrong";
      }
    } catch (err) {
      errorBox.style.display = "block";
      errorBox.innerText = "Connection error";
    }
  });
</script>

</body>
</html>
