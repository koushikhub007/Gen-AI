<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Gen AI</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #0a0a0f; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .auth-box { background: #16161f; padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 0 20px rgba(99, 102, 241, 0.2); }
    h2 { text-align: center; color: #6366f1; margin-bottom: 30px; }
    input { width: 100%; padding: 15px; margin-bottom: 15px; background: #0a0a0f; border: 1px solid #2a2a3a; border-radius: 10px; color: white; font-size: 16px; outline: none; }
    input:focus { border-color: #6366f1; }
    button { width: 100%; padding: 15px; background: linear-gradient(135deg, #6366f1, #8b5cf6); border: none; border-radius: 10px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
    button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4); }
    .switch { text-align: center; margin-top: 20px; color: #888; font-size: 14px; }
    .switch a { color: #6366f1; text-decoration: none; font-weight: bold; cursor: pointer; }
    .error { color: #ef4444; text-align: center; margin-bottom: 15px; font-size: 14px; display: none; }
  </style>
</head>
<body>

<div class="auth-box">
  <h2 id="formTitle">Login</h2>
  <div id="errorBox" class="error"></div>
  
  <form id="authForm">
    <input type="text" id="username" placeholder="Username" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>

  <div class="switch">
    Don't have an account? <a onclick="toggleForm()">Sign Up</a>
  </div>
</div>

<script>
  let isLogin = true;

  function toggleForm() {
    isLogin = !isLogin;
    document.getElementById('formTitle').innerText = isLogin ? "Login" : "Sign Up";
    document.querySelector('button').innerText = isLogin ? "Login" : "Sign Up";
    document.querySelector('.switch a').innerText = isLogin ? "Sign Up" : "Login";
    document.querySelector('.switch').innerHTML = isLogin 
      ? "Don't have an account? <a onclick='toggleForm()'>Sign Up</a>" 
      : "Already have an account? <a onclick='toggleForm()'>Login</a>";
  }

  document.getElementById('authForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const errorBox = document.getElementById('errorBox');
    
    const endpoint = isLogin ? '/api/login' : '/api/signup';

    try {
      const response = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      
      const data = await response.json();

      if (data.success) {
        window.location.href = "/";
      } else {
        errorBox.style.display = "block";
        errorBox.innerText = data.message || "Something went wrong";
      }
    } catch (err) {
      errorBox.style.display = "block";
      errorBox.innerText = "Connection error";
    }
  });
</script>

</body>
</html>
