<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gen AI Chat</title>
  <style>
    :root { --bg-primary: #0a0a0f; --bg-secondary: #12121a; --bg-card: #1a1a24; --bg-input: #16161f; --border-color: #2a2a3a; --text-primary: #f0f0f5; --text-secondary: #a0a0b0; --text-muted: #606070; --accent: #6366f1; --accent-glow: rgba(99, 102, 241, 0.3); --success: #10b981; --danger: #ef4444; }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); height: 100%; overflow: hidden; position: fixed; width: 100%; }
    html, body { height: 100%; }
    h1, h2, h3, .font-display { font-family: 'Space Grotesk', sans-serif; }
    
    .bg-gradient-mesh { position: fixed; inset: 0; background: radial-gradient(ellipse 80% 50% at 20% 20%, rgba(99, 102, 241, 0.08) 0%, transparent 50%), radial-gradient(ellipse 60% 40% at 80% 80%, rgba(139, 92, 246, 0.06) 0%, transparent 50%); pointer-events: none; z-index: 0; }
    
    .main-container { display: flex; flex-direction: column; height: 100%; position: relative; z-index: 5; }
    
    .main-header { padding: 16px 24px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; background: rgba(10, 10, 15, 0.8); backdrop-filter: blur(12px); flex-shrink: 0; }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .header-title { font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 600; letter-spacing: -0.5px; }
    .header-subtitle { font-size: 11px; color: var(--text-muted); }
    .logout-btn { background: transparent; border: 1px solid var(--danger); color: var(--danger); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; transition: 0.2s; text-decoration: none; display: inline-block; }
    .logout-btn:hover { background: var(--danger); color: white; }

    .chat-container { flex: 1; overflow-y: auto; padding: 24px; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
    .home-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; min-height: 100%; }
    .home-screen.hidden { display: none !important; }
    .greeting { font-family: 'Space Grotesk', sans-serif; font-size: 28px; font-weight: 600; margin-bottom: 8px; text-align: center; }
    .greeting-sub { font-size: 15px; color: var(--text-secondary); margin-bottom: 36px; text-align: center; }
    .quick-actions { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; width: 100%; max-width: 800px; }
    .quick-action-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 14px; padding: 18px; cursor: pointer; transition: all 0.3s ease; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 10px; }
    .quick-action-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(99, 102, 241, 0.12); }
    .quick-action-title { font-size: 13px; font-weight: 600; }

    .messages-container { display: none; flex-direction: column; gap: 20px; max-width: 800px; margin: 0 auto; width: 100%; }
    .messages-container.active { display: flex !important; }
    .message { display: flex; gap: 12px; animation: messageIn 0.4s ease; width: 100%; }
    @keyframes messageIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .message.user { justify-content: flex-end; }
    .message.ai { justify-content: flex-start; }
    .message-body { display: flex; flex-direction: column; gap: 6px; max-width: 80%; padding: 10px; }
    .message-content { padding: 14px 18px; border-radius: 16px; font-size: 14px; line-height: 1.6; word-wrap: break-word; }
    .message.user .message-content { background: linear-gradient(135deg, #1e3a5f, #1e40af); border-bottom-right-radius: 4px; }
    .message.ai .message-content { background: var(--bg-card); border: 1px solid var(--border-color); border-bottom-left-radius: 4px; }

    .input-area { position: relative; padding: 12px 16px; padding-bottom: calc(12px + env(safe-area-inset-bottom)); background: var(--bg-primary); border-top: 1px solid var(--border-color); flex-shrink: 0; }
    .input-wrapper { max-width: 800px; margin: 0 auto; background: var(--bg-input); border: 1px solid var(--border-color); border-radius: 18px; padding: 8px 12px; display: flex; align-items: center; gap: 8px; transition: all 0.3s ease; }
    .input-wrapper:focus-within { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
    .input-field { flex: 1; background: transparent; border: none; outline: none; color: var(--text-primary); font-size: 15px; resize: none; min-height: 24px; max-height: 100px; line-height: 1.5; }
    
    .action-btn { width: 38px; height: 38px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s ease; color: var(--text-secondary); flex-shrink: 0; }
    .action-btn:hover { background: var(--bg-secondary); border-color: var(--text-muted); color: var(--text-primary); }
    .action-btn.send { background: linear-gradient(135deg, #6366f1, #8b5cf6); border: none; color: white; }
    .action-btn.send:hover { transform: scale(1.05); box-shadow: 0 4px 16px var(--accent-glow); }
    
    .model-btn { height: 100%; padding: 0 10px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; display: flex; align-items: center; gap: 4px; cursor: pointer; font-size: 12px; font-weight: 500; color: var(--text-primary); }
    .model-dropdown { position: absolute; bottom: calc(100% + 8px); right: 0; width: 240px; background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px; padding: 6px; opacity: 0; visibility: hidden; z-index: 100; }
    .model-dropdown.open { opacity: 1; visibility: visible; }
    .model-option { padding: 10px; border-radius: 8px; cursor: pointer; font-size: 13px; }
    .model-option.selected { background: var(--bg-card); border: 1px solid var(--accent); }
    .model-option:hover { background: var(--bg-card); }

    .typing-indicator { display: none; align-items: center; gap: 12px; animation: messageIn 0.4s ease; max-width: 800px; margin: 0 auto; width: 100%; }
    .typing-indicator.visible { display: flex; margin-bottom: 10px; }
    .typing-dots { display: flex; gap: 4px; padding: 12px 16px; background: var(--bg-card); border-radius: 16px; border: 1px solid var(--border-color); }
    .typing-dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; animation: typingBounce 1.4s ease-in-out infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }

    @media (max-width: 768px) { .message-content { max-width: 85%; } }
  </style>
</head>
<body>
  <div class="bg-gradient-mesh"></div>

  <main class="main-container">
    <header class="main-header">
      <div class="header-left">
        <div class="header-title-group">
          <h1 class="header-title">Gen AI</h1>
          <p class="header-subtitle">Welcome, {{ username }}</p>
        </div>
      </div>
      <a href="/logout" class="logout-btn">Logout</a>
    </header>

    <div class="chat-container" id="chatContainer">
      <div class="home-screen" id="homeScreen">
        <h2 class="greeting">Hi, there</h2>
        <p class="greeting-sub">Where should we start today?</p>
        <div class="quick-actions" id="quickActions"></div>
      </div>
      <div class="messages-container" id="messagesContainer"></div>
      <div class="typing-indicator" id="typingIndicator">
        <div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea class="input-field" id="messageInput" placeholder="" rows="1"></textarea>
        <div class="input-actions">
          <div class="model-selector">
            <button class="model-btn" id="modelBtn">
              <span id="selectedModelName">Thinking</span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </button>
            <div class="model-dropdown" id="modelDropdown">
              <div class="model-option selected" data-model="thinking">Thinking</div>
              <div class="model-option" data-model="pro">Pro</div>
            </div>
          </div>
          <button class="action-btn send" id="sendBtn">Send</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    const state = { messages: [], currentModel: { id: 'thinking' }, isGenerating: false };
    const dom = {};
    
    document.addEventListener('DOMContentLoaded', function() {
        dom.messageInput = document.getElementById('messageInput');
        dom.sendBtn = document.getElementById('sendBtn');
        dom.chatContainer = document.getElementById('chatContainer');
        dom.messagesContainer = document.getElementById('messagesContainer');
        dom.homeScreen = document.getElementById('homeScreen');
        dom.typingIndicator = document.getElementById('typingIndicator');
        dom.modelDropdown = document.getElementById('modelDropdown');
        dom.modelBtn = document.getElementById('modelBtn');
        dom.selectedModelName = document.getElementById('selectedModelName');
        dom.quickActions = document.getElementById('quickActions');

        if(dom.sendBtn) dom.sendBtn.addEventListener('click', sendMessage);
        if(dom.modelBtn) dom.modelBtn.addEventListener('click', (e) => { e.stopPropagation(); dom.modelDropdown.classList.toggle('open'); });
        document.addEventListener('click', () => { if(dom.modelDropdown) dom.modelDropdown.classList.remove('open'); });
        
        if(dom.modelDropdown) {
            dom.modelDropdown.querySelectorAll('.model-option').forEach(opt => {
                opt.addEventListener('click', function() {
                    state.currentModel.id = this.dataset.model;
                    dom.selectedModelName.textContent = this.innerText;
                    dom.modelDropdown.classList.remove('open');
                });
            });
        }
        renderQuickActions();
    });

    function renderQuickActions() {
        const actions = [
            { title: 'Write Code', prompt: 'Write a python script' },
            { title: 'Learn', prompt: 'Explain quantum computing' }
        ];
        if(dom.quickActions) {
            dom.quickActions.innerHTML = actions.map(a => `
                <div class="quick-action-card" onclick="setPrompt('${a.prompt}')">
                    <div class="quick-action-title">${a.title}</div>
                </div>
            `).join('');
        }
    }

    function setPrompt(text) { if(dom.messageInput) { dom.messageInput.value = text; dom.messageInput.focus(); } }

    function sendMessage() {
        const text = dom.messageInput.value.trim();
        if (!text || state.isGenerating) return;
        dom.messageInput.value = '';
        addMessage(text, 'user');
        state.isGenerating = true;
        dom.typingIndicator.classList.add('visible');
        
        fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text, model: state.currentModel.id })
        })
        .then(res => res.json())
        .then(data => {
            state.isGenerating = false;
            dom.typingIndicator.classList.remove('visible');
            if(data.reply) addMessage(data.reply, 'ai');
            else alert("Error: " + data.reply);
        })
        .catch(err => { state.isGenerating = false; dom.typingIndicator.classList.remove('visible'); alert("Connection error"); });
    }

    function addMessage(text, sender) {
        if(dom.homeScreen) dom.homeScreen.classList.add('hidden');
        if(dom.messagesContainer) dom.messagesContainer.classList.add('active');
        
        const div = document.createElement('div');
        div.className = `message ${sender}`;
        div.innerHTML = `<div class="message-body"><div class="message-content">${text}</div></div>`;
        if(dom.messagesContainer) dom.messagesContainer.appendChild(div);
        if(dom.chatContainer) dom.chatContainer.scrollTop = dom.chatContainer.scrollHeight;
    }
  </script>
</body>
</html>
