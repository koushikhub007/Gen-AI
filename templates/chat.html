<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gen AI Chat</title>
  <style>
    :root { --bg-primary: #0a0a0f; --bg-secondary: #12121a; --bg-card: #1a1a24; --bg-input: #16161f; --border-color: #2a2a3a; --text-primary: #f0f0f5; --text-secondary: #a0a0b0; --text-muted: #606070; --accent: #6366f1; --accent-glow: rgba(99, 102, 241, 0.3); --success: #10b981; --danger: #ef4444; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg-primary); color: var(--text-primary); height: 100%; overflow: hidden; position: fixed; width: 100%; }
    html, body { height: 100%; }
    
    .bg-gradient-mesh { position: fixed; inset: 0; background: radial-gradient(ellipse 80% 50% at 20% 20%, rgba(99, 102, 241, 0.08) 0%, transparent 50%); pointer-events: none; z-index: 0; }
    
    .main-container { display: flex; flex-direction: column; height: 100%; position: relative; z-index: 5; }
    
    .main-header { padding: 16px 24px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; background: rgba(10, 10, 15, 0.8); backdrop-filter: blur(12px); }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .header-title { font-size: 18px; font-weight: 600; }
    .header-subtitle { font-size: 11px; color: var(--text-muted); }
    .logout-btn { background: transparent; border: 1px solid var(--danger); color: var(--danger); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; transition: 0.2s; text-decoration: none; }
    .logout-btn:hover { background: var(--danger); color: white; }

    .chat-container { flex: 1; overflow-y: auto; padding: 24px; scroll-behavior: smooth; }
    
    .home-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; min-height: 100%; }
    .home-screen.hidden { display: none !important; }
    .greeting { font-size: 28px; font-weight: 600; margin-bottom: 8px; }
    .greeting-sub { font-size: 15px; color: var(--text-secondary); margin-bottom: 36px; }
    .quick-actions { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; width: 100%; max-width: 800px; }
    .quick-action-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 14px; padding: 18px; cursor: pointer; transition: all 0.3s ease; text-align: center; }
    .quick-action-card:hover { border-color: var(--accent); transform: translateY(-3px); }
    .quick-action-title { font-size: 13px; font-weight: 600; }

    .messages-container { display: none; flex-direction: column; gap: 20px; max-width: 800px; margin: 0 auto; width: 100%; }
    .messages-container.active { display: flex !important; }
    .message { display: flex; gap: 12px; width: 100%; animation: fadeIn 0.3s ease; }
    .message.user { justify-content: flex-end; }
    .message.ai { justify-content: flex-start; }
    .message-body { max-width: 80%; padding: 10px; }
    .message-content { padding: 14px 18px; border-radius: 16px; font-size: 14px; line-height: 1.6; word-wrap: break-word; }
    .message.user .message-content { background: linear-gradient(135deg, #1e3a5f, #1e40af); border-bottom-right-radius: 4px; }
    .message.ai .message-content { background: var(--bg-card); border: 1px solid var(--border-color); border-bottom-left-radius: 4px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .input-area { padding: 12px 16px; background: var(--bg-primary); border-top: 1px solid var(--border-color); }
    .input-wrapper { max-width: 800px; margin: 0 auto; background: var(--bg-input); border: 1px solid var(--border-color); border-radius: 18px; padding: 8px 12px; display: flex; align-items: center; gap: 8px; }
    .input-field { flex: 1; background: transparent; border: none; outline: none; color: var(--text-primary); font-size: 15px; resize: none; min-height: 24px; max-height: 100px; }
    
    .action-btn { width: 38px; height: 38px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-secondary); font-size: 16px; }
    .action-btn.send { background: linear-gradient(135deg, #6366f1, #8b5cf6); border: none; color: white; }
    
    .model-btn { padding: 0 10px; height: 38px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 10px; color: var(--text-primary); cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 4px; }
    .model-dropdown { position: absolute; bottom: 100%; right: 0; background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 8px; padding: 6px; margin-bottom: 8px; display: none; min-width: 100px; z-index: 10; }
    .model-dropdown.open { display: block; }
    .model-option { padding: 8px 12px; cursor: pointer; border-radius: 4px; font-size: 12px; }
    .model-option:hover { background: var(--bg-card); }
    .model-selector { position: relative; }

    .typing-indicator { display: none; padding: 12px; margin-bottom: 10px; max-width: 800px; margin: 0 auto; }
    .typing-indicator.visible { display: block; }
    .typing-dot { height: 8px; width: 8px; background-color: var(--accent); border-radius: 50%; display: inline-block; margin: 0 2px; animation: bounce 1.4s infinite ease-in-out both; }
    .typing-dot:nth-child(1) { animation-delay: -0.32s; }
    .typing-dot:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1.0); } }
  </style>
</head>
<body>
  <div class="bg-gradient-mesh"></div>

  <main class="main-container">
    <header class="main-header">
      <div class="header-left">
        <div>
          <h1 class="header-title">Gen AI</h1>
          <!-- এখানে Python থেকে Username আসবে -->
          <p class="header-subtitle">Welcome, {{ username }}</p>
        </div>
      </div>
      <a href="/logout" class="logout-btn">Logout</a>
    </header>

    <div class="chat-container" id="chatContainer">
      <div class="home-screen" id="homeScreen">
        <h2 class="greeting">Hi, {{ username }}</h2>
        <p class="greeting-sub">Where should we start today?</p>
        <div class="quick-actions" id="quickActions">
          <div class="quick-action-card" onclick="setPrompt('Write a Python script')">Write Code</div>
          <div class="quick-action-card" onclick="setPrompt('Explain quantum computing')">Learn</div>
          <div class="quick-action-card" onclick="setPrompt('Create an image of a futuristic city')">Create Image</div>
        </div>
      </div>
      
      <div class="messages-container" id="messagesContainer"></div>
      
      <div class="typing-indicator" id="typingIndicator">
        <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea class="input-field" id="messageInput" placeholder="Type a message..." rows="1"></textarea>
        
        <div class="model-selector">
           <button class="model-btn" id="modelBtn">Thinking ▾</button>
           <div class="model-dropdown" id="modelDropdown">
             <div class="model-option" data-model="thinking" onclick="selectModel('thinking', this)">Thinking</div>
             <div class="model-option" data-model="pro" onclick="selectModel('pro', this)">Pro</div>
           </div>
        </div>

        <button class="action-btn send" id="sendBtn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </main>

  <script>
    const state = { currentModel: 'thinking' };
    
    // Model Dropdown Toggle
    document.getElementById('modelBtn').addEventListener('click', () => {
       document.getElementById('modelDropdown').classList.toggle('open');
    });

    function selectModel(model, elem) {
       state.currentModel = model;
       document.getElementById('modelBtn').innerText = model.charAt(0).toUpperCase() + model.slice(1) + " ▾";
       document.querySelectorAll('.model-option').forEach(e => e.style.background = 'transparent');
       elem.style.background = 'var(--bg-card)';
       document.getElementById('modelDropdown').classList.remove('open');
    }

    function setPrompt(text) {
       document.getElementById('messageInput').value = text;
       document.getElementById('messageInput').focus();
    }

    function addMessage(text, sender) {
       const container = document.getElementById('messagesContainer');
       const div = document.createElement('div');
       div.className = `message ${sender}`;
       div.innerHTML = `<div class="message-body"><div class="message-content">${text}</div></div>`;
       container.appendChild(div);
       
       // Scroll to bottom
       document.getElementById('chatContainer').scrollTop = document.getElementById('chatContainer').scrollHeight;
    }

    function sendMessage() {
       const input = document.getElementById('messageInput');
       const text = input.value.trim();
       if (!text) return;

       // Show message in UI
       document.getElementById('homeScreen').classList.add('hidden');
       document.getElementById('messagesContainer').classList.add('active');
       addMessage(text, 'user');
       
       input.value = '';
       
       // Show typing indicator
       document.getElementById('typingIndicator').classList.add('visible');

       // Send to backend
       fetch('/chat', {
           method: 'POST',
           headers: { 'Content-Type': 'application/json' },
           body: JSON.stringify({ message: text, model: state.currentModel })
       })
       .then(res => res.json())
       .then(data => {
           document.getElementById('typingIndicator').classList.remove('visible');
           if(data.reply) addMessage(data.reply, 'ai');
           else addMessage("Error: " + (data.error || "Unknown"), 'ai');
       })
       .catch(err => {
           document.getElementById('typingIndicator').classList.remove('visible');
           addMessage("Connection Error", 'ai');
       });
    }

    // Enter key to send
    document.getElementById('messageInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
  </script>
</body>
</html>
